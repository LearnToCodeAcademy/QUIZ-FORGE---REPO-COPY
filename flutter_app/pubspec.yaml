version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: "3.41.7"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
